<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow DOM Component Isolation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-20">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-8 text-slate-800">System Preferences</h1>
        
        <div class="space-y-6 bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <label class="block text-sm font-medium text-slate-700 mb-2">Primary Region</label>
            <!-- Custom Shadow DOM Component -->
            <custom-select id="region-select"></custom-select>
            
            <button class="w-full bg-slate-800 text-white py-2 rounded-lg mt-10 hover:bg-slate-700 transition">Save Changes</button>
        </div>
    </div>

    <!-- Web Component Template -->
    <template id="select-template">
        <style>
            .wrapper { position: relative; font-family: sans-serif; }
            .trigger { 
                padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; 
                cursor: pointer; background: white; display: flex; justify-content: space-between;
            }
            .dropdown { 
                position: absolute; top: 100%; left: 0; right: 0; background: white;
                border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 5px;
                display: none; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            }
            .dropdown.open { display: block; }
            .option { padding: 10px 15px; cursor: pointer; }
            .option:hover { background: #f1f5f9; }
            .close-area { position: absolute; right: 10px; color: #94a3b8; font-size: 12px; }
        </style>
        <div class="wrapper">
            <div class="trigger" id="main-trigger">
                <span id="label">Select Region...</span>
                <span class="arrow">▼</span>
            </div>
            <div class="dropdown" id="menu">
                <div class="option" data-val="us-east">US East (N. Virginia)</div>
                <div class="option" data-val="us-west">US West (Oregon)</div>
                <div class="option" data-val="eu-central">EU Central (Frankfurt)</div>
                <div class="option" id="custom-trigger">
                    Custom Config... <span class="close-area">Click to close</span>
                </div>
            </div>
        </div>
    </template>

    <script>
        class CustomSelect extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
                const template = document.getElementById('select-template');
                this.shadowRoot.appendChild(template.content.cloneNode(true));
                this.isOpen = false;
            }

            connectedCallback() {
                this.shadowRoot.getElementById('main-trigger').onclick = (e) => {
                    e.stopPropagation();
                    this.toggle();
                };

                this.shadowRoot.querySelectorAll('.option').forEach(opt => {
                    opt.onclick = (e) => {
                        this.shadowRoot.getElementById('label').innerText = opt.innerText;
                        this.close();
                    };
                });

                // The Pitfall: Outside click listener uses event.target.
                // When clicking inside the Shadow DOM (e.g. on the 'Custom Config' option),
                // the event target seen by document is the <custom-select> host.
                // If the developer tries to check for specific internal IDs or classes,
                // it will fail because those are hidden behind the shadow boundary.
                document.addEventListener('click', (e) => {
                    console.log("Global click target:", e.target);
                    
                    // Logic: If I click the 'close-area' span, I expect the menu to close.
                    // But e.target will always be 'CUSTOM-SELECT', not the span.
                    if (e.target.id === 'custom-trigger') {
                        this.close();
                    } else if (!this.contains(e.target)) {
                        this.close();
                    }
                });
            }

            toggle() {
                this.isOpen ? this.close() : this.open();
            }

            open() {
                this.isOpen = true;
                this.shadowRoot.getElementById('menu').classList.add('open');
            }

            close() {
                this.isOpen = false;
                this.shadowRoot.getElementById('menu').classList.remove('open');
            }
        }

        customElements.define('custom-select', CustomSelect);
    </script>
</body>
</html>
