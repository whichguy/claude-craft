<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoSpatial Intelligence - Interactive Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .map-container {
            width: 100%;
            height: 100vh;
            background: #e2e8f0;
            position: relative;
            cursor: crosshair;
        }
        .info-overlay {
            position: absolute;
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 200px;
            pointer-events: auto; /* PITFALL: Explicitly auto */
            transition: opacity 0.5s ease;
            z-index: 10;
        }
        .info-overlay.hidden {
            opacity: 0;
            /* Missing pointer-events: none; here */
        }
        .map-marker {
            width: 20px;
            height: 20px;
            background: #ef4444;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            z-index: 5;
        }
    </style>
</head>
<body class="overflow-hidden">
    <div class="absolute top-4 left-4 z-20 bg-white/80 backdrop-blur p-4 rounded shadow-lg max-w-xs">
        <h1 class="font-bold text-slate-800">Regional Node Map</h1>
        <p class="text-xs text-slate-600 mt-1">Hover over nodes to see telemetry. Click map to clear overlays.</p>
        <div id="status" class="mt-2 text-[10px] font-mono text-blue-600">IDLE</div>
    </div>

    <div class="map-container" id="map">
        <!-- Markers -->
        <div class="map-marker" style="top: 30%; left: 40%;" data-node="NODE-X1"></div>
        <div class="map-marker" style="top: 50%; left: 60%;" data-node="NODE-Y2"></div>
        <div class="map-marker" style="top: 70%; left: 30%;" data-node="NODE-Z3"></div>

        <!-- Overlays -->
        <div id="overlay-NODE-X1" class="info-overlay hidden" style="top: 30%; left: 42%;">
            <div class="text-xs font-bold">NODE-X1</div>
            <div class="text-[10px] text-slate-500">Latency: 24ms</div>
            <button class="mt-2 w-full bg-slate-100 text-[10px] py-1 rounded">Details</button>
        </div>
        <div id="overlay-NODE-Y2" class="info-overlay hidden" style="top: 50%; left: 62%;">
            <div class="text-xs font-bold">NODE-Y2</div>
            <div class="text-[10px] text-slate-500">Latency: 112ms</div>
            <button class="mt-2 w-full bg-slate-100 text-[10px] py-1 rounded">Details</button>
        </div>
    </div>

    <script>
        const map = document.getElementById('map');
        const status = document.getElementById('status');

        // The Pitfall: Invisible overlays (opacity: 0) still block the map click event
        // because pointer-events is still 'auto'. This makes it impossible to click 
        // the map "through" where a hidden overlay exists.
        map.addEventListener('click', (e) => {
            if (e.target === map) {
                status.innerText = `MAP CLICK AT ${e.offsetX}, ${e.offsetY}`;
                hideAll();
            }
        });

        document.querySelectorAll('.map-marker').forEach(marker => {
            marker.addEventListener('mouseenter', () => {
                const nodeId = marker.getAttribute('data-node');
                showOverlay(nodeId);
            });
        });

        function showOverlay(id) {
            hideAll();
            const el = document.getElementById(`overlay-${id}`);
            el.classList.remove('hidden');
            status.innerText = `INSPECTING ${id}`;
        }

        function hideAll() {
            document.querySelectorAll('.info-overlay').forEach(overlay => {
                overlay.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
