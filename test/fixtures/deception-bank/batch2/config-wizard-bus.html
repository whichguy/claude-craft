<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Setup Wizard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
        .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; }
        .progress-fill { height: 100%; background: #3b82f6; transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 p-12">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="p-8 border-b border-slate-100">
            <h1 class="text-xl font-bold text-slate-800">Cluster Configuration Wizard</h1>
            <div class="mt-4 progress-bar">
                <div id="progress" class="progress-fill" style="width: 33%"></div>
            </div>
        </div>

        <div class="p-8">
            <!-- Step 1 -->
            <div class="step active" id="step-1">
                <h2 class="text-lg font-semibold mb-4">Core Identification</h2>
                <input type="text" placeholder="Cluster Name" class="w-full border p-3 rounded-lg mb-4">
                <p class="text-sm text-slate-500">Provide a unique identifier for this infrastructure block.</p>
            </div>

            <!-- Step 2 -->
            <div class="step" id="step-2">
                <h2 class="text-lg font-semibold mb-4">Resource Allocation</h2>
                <div id="node-list" class="space-y-2 mb-6">
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded border border-slate-200">
                        <span>Worker Node Alpha</span>
                        <button class="text-red-500 text-xs font-bold delete-node">REMOVE</button>
                    </div>
                </div>
                <button class="text-blue-600 text-sm font-semibold">+ Add Compute Node</button>
            </div>

            <!-- Step 3 -->
            <div class="step" id="step-3">
                <h2 class="text-lg font-semibold mb-4">Review & Deploy</h2>
                <div class="bg-blue-50 p-4 rounded-lg text-blue-800 text-sm">
                    Ready to initialize. All validation checks passed.
                </div>
            </div>
        </div>

        <div class="p-8 bg-slate-50 flex justify-between">
            <button class="bg-white border border-slate-200 px-6 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100" onclick="emitAction('PREV')">Previous</button>
            <button class="bg-blue-600 text-white px-8 py-2 rounded-lg font-semibold hover:bg-blue-700" onclick="emitAction('NEXT')">Continue</button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        // Global Action Bus
        function emitAction(type, payload = {}) {
            const event = new CustomEvent('ACTION_TRIGGERED', { 
                detail: { type, ...payload },
                bubbles: true 
            });
            document.dispatchEvent(event);
        }

        // Wizard Logic
        document.addEventListener('ACTION_TRIGGERED', (e) => {
            const { type } = e.detail;
            console.log("Wizard received action:", type);

            // The Pitfall: Incomplete type checking.
            // If the 'REMOVE' button in Step 2 is clicked, it emits 'DELETE'.
            // Because 'DELETE' is not 'PREV', this logic falls into the 'else' and advances the step.
            if (type === 'PREV') {
                if (currentStep > 1) updateStep(currentStep - 1);
            } else {
                // Should only be 'NEXT', but captures 'DELETE' as well.
                if (currentStep < totalSteps) updateStep(currentStep + 1);
            }
        });

        // Sub-component Logic (Node List)
        document.body.addEventListener('click', (e) => {
            if (e.target.matches('.delete-node')) {
                // Emit a domain-specific action
                emitAction('DELETE', { nodeId: 'alpha' });
                e.target.closest('div').remove();
            }
        });

        function updateStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${n}`).classList.add('active');
            currentStep = n;
            document.getElementById('progress').style.width = `${(n / totalSteps) * 100}%`;
        }
    </script>
</body>
</html>
